services:
  redis:
    image: redis:7-alpine
    container_name: nationscope-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  app:
    build: .
    container_name: nationscope-app
    ports:
      - "8080:8080"
    environment:
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=6379
    depends_on:
      - redis
    restart: unless-stopped